networks:
  laravel_network:

services:
  server:
    build:
      context: .
      dockerfile: dockerfiles/nginx.dockerfile
    # Solo escucha en la interfaz local, puerto 8085 (libre en el VPS)
    ports:
      - "127.0.0.1:8085:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - mysql
    container_name: laravel_server
    networks:
      - laravel_network
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: dockerfiles/php.dockerfile
    volumes:
      - ./src:/var/www/html:delegated
      # Es importante que el archivo log exista en el host para evitar fallos de montaje
      - ./logs/laravel.log:/var/www/html/storage/logs/laravel.log
    container_name: laravel_php
    networks:
      - laravel_network
    restart: unless-stopped
    
  mysql:
    image: mysql:8.0.1
    restart: unless-stopped
    tty: true
    container_name: laravel_mysql
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    # No exponemos el puerto al exterior. Solo es accesible desde dentro de 'laravel_network'
    # Si requieres acceder desde el host o tu PC vía SSH, bindeamos a la IP local interna
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - laravel_network
    volumes:
      - mysql_data:/var/lib/mysql

  # PHPMyAdmin en producción se bindea solo a 127.0.0.1 para que nadie lo husmee
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2.1 
    restart: always
    container_name: laravel_phpmyadmin
    depends_on:
      - mysql
    ports:
      - "127.0.0.1:8090:80"
    environment:
      - PMA_HOST=mysql
      - PMA_USER=${MYSQL_USER}
      - PMA_PASSWORD=${MYSQL_PASSWORD}
      - PMA_ABSOLUTE_URI=http://localhost:8090/
      - PMA_ARBITRARY=1
      - PMA_SSL=false
    networks:
      - laravel_network

  artisan:
    build:
      context: .
      dockerfile: dockerfiles/php.dockerfile
    volumes:
      - ./src:/var/www/html
    entrypoint: ["php", "/var/www/html/artisan"]
    depends_on:
      - php
      - mysql
    networks:
      - laravel_network

volumes:
  mysql_data: